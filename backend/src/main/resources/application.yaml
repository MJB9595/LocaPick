spring:
  application:
    name: picstory-backend

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/cruddb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul}
    username: ${SPRING_DATASOURCE_USERNAME:cruduser}
    password: ${SPRING_DATASOURCE_PASSWORD:crudpass}

  jpa:
    hibernate:
      ddl-auto: update      # 개발: update | 운영: validate 또는 none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

# ─── JWT ──────────────────────────────────────────────────────
jwt:
  # 최소 32자 이상의 시크릿 키 (운영환경에서는 환경변수로 주입)
  secret: ${JWT_SECRET:picstory-secret-key-must-be-at-least-32-chars!}
  expiration-ms: ${JWT_EXPIRATION_MS:7200000}   # 24시간 (ms)

# ─── Actuator ─────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
# ─── Kakao API ────────────────────────────────────────────────
kakao:
  rest-api-key: ${KAKAO_REST_KEY:default_key_if_missing}

app:
  upload:
    dir: ${UPLOAD_DIR:./uploads/profiles/}
    # 로컬 기본값: ./uploads/profiles/  (JAR 실행 위치 기준)
    # Docker: 환경변수 UPLOAD_DIR=/app/uploads/profiles/ 주입

