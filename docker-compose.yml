version: '3.8'
services:

  mysql:
    image: mysql:8.0
    container_name: mysql-M_UI-prod
    # secure-file-priv 폴더 검사 강제 무시 명령!
    # DB 직접 입출력기능이 없으니 필요없는 기능
    command: --secure-file-priv=""
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
      MYSQL_DATABASE:      ${MYSQL_DATABASE:-MUI_db}
      MYSQL_USER:          ${MYSQL_USER:-m_uiuser}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD:-m_uipass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_prod_v3:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    # ✅ 메모리 제한 (NAS OOM 방지)
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-1234}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s  # ✅ MySQL 초기화 대기 시간 확보

  backend:
    environment:
      SPRING_DATASOURCE_URL:      jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-MUI_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-m_uiuser}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-m_uipass}
      JWT_SECRET:        ${JWT_SECRET:-change-this-secret-key-in-production-min-32chars!}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      # ✅ 추가: 업로드 경로
      UPLOAD_DIR: /app/uploads/profiles/
    ports:
      - "8090:8080"
    volumes:
      # ✅ 추가: 업로드 파일 영구 보존 (컨테이너 재시작해도 사진 유지)
      - uploads_data:/app/uploads
    build:
      context: ./backend
      dockerfile: Dockerfile_backend.prod
    container_name: spring-back-M_UI-prod
    depends_on:
      mysql:
        condition: service_healthy
    restart: always
    # ✅ 메모리 제한
    deploy:
      resources:
        limits:
          memory: 2g
    # ✅ 헬스체크 추가 (frontend가 backend 뜨기 전에 요청하는 것 방지)
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: react-front-M_UI-prod
    depends_on:
      backend:
        condition: service_healthy  # ✅ 백엔드 준비 후 프론트 시작
    ports:
      - "5173:80"
    restart: always

volumes:
  mysql_data_prod_v3:
  uploads_data:  
