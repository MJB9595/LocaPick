services:
 mysql:
  image: mysql:8.0
  container_name: mysql-M_UI
  environment:
   MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
   MYSQL_DATABASE: ${MYSQL_DATABASE:-MUI_db}
   MYSQL_USER: ${MYSQL_USER:-m_uiuser}
   MYSQL_PASSWORD: ${MYSQL_PASSWORD:-m_uipass}
  ports:
   - "3306:3306"
  volumes:
   - mysql_data:/var/lib/mysql
  healthcheck:
   test:
    [
     "CMD",
     "mysqladmin",
     "ping",
     "-h",
     "127.0.0.1",
     "-uroot",
     "-p${MYSQL_ROOT_PASSWORD:-1234}",
    ]
   interval: 5s
   timeout: 3s
   retries: 30
   deploy:
      resources:
        limits:
          memory: 2g

 backend:
  build:
   context: ./backend
   dockerfile: Dockerfile.dev
  container_name: spring-back-M_UI
  depends_on:
   mysql:
    condition: service_healthy
  environment:
   SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-MUI_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
   SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-m_uiuser}
   SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-m_uipass}
   GRADLE_USER_HOME: /root/.gradle
  ports:
   - "8080:8080"
  volumes:
   - ./backend:/app
   - gradle_cache:/root/.gradle
   - /app/build
   - /app/.gradle
  healthcheck:
   test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
   interval: 10s
   timeout: 5s
   retries: 10
   start_period: 60s
   deploy:
      resources:
        limits:
          memory: 2g

 frontend:
  build:
   context: ./frontend
   dockerfile: Dockerfile.dev
  container_name: vite-front-M_UI
  depends_on:
   backend:
    condition: service_healthy
  environment:
   CHOKIDAR_USEPOLLING: "true"
   WATCHPACK_POLLING: "true"
  ports:
   - "5173:5173"
  volumes:
   - ./frontend:/app
   - /app/node_modules

volumes:
 mysql_data:
 gradle_cache: